<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SaaS厂商需求提交</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", sans-serif;
      background: #f5f5f7; min-height: 100vh;
      display: flex; align-items: flex-start; justify-content: center;
      padding: 48px 16px 80px;
      -webkit-font-smoothing: antialiased;
    }
    .card { background: #fff; border-radius: 20px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); width: 100%; max-width: 640px; overflow: hidden; }

    .header { background: linear-gradient(180deg, #2d1b69 0%, #3d2b7f 100%); padding: 32px 36px 28px; color: #fff; }
    .header .badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.15); border-radius: 980px; padding: 4px 14px; font-size: 11px; font-weight: 500; letter-spacing: 0.02em; margin-bottom: 14px; text-transform: uppercase; }
    .header h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 6px; line-height: 1.2; }
    .header p { font-size: 13px; color: rgba(255,255,255,0.6); }
    .source-tag { margin-top: 20px; display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 11px 16px; font-size: 13px; color: rgba(255,255,255,0.85); }
    .source-tag .dot { width: 7px; height: 7px; border-radius: 50%; background: #30d158; flex-shrink: 0; box-shadow: 0 0 0 2px rgba(48,209,88,0.3); }

    .body { padding: 32px 36px 40px; }
    .field { margin-bottom: 24px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #1d1d1f; margin-bottom: 7px; }
    label .req { color: #ff3b30; margin-left: 2px; }
    label .hint { font-weight: 400; color: #6e6e73; font-size: 12px; margin-left: 6px; }
    textarea, input[type="text"], select {
      width: 100%; border: 1.5px solid #d2d2d7; border-radius: 10px;
      padding: 12px 16px; font-size: 15px; color: #1d1d1f;
      outline: none; transition: border-color 0.15s, box-shadow 0.15s;
      background: #fff; font-family: inherit;
    }
    textarea:focus, input[type="text"]:focus, select:focus {
      border-color: #6c5ce7; box-shadow: 0 0 0 3px rgba(108,92,231,0.2);
    }
    textarea { resize: vertical; min-height: 108px; line-height: 1.6; }

    .radio-group { display: flex; flex-wrap: wrap; gap: 8px; }
    .radio-group label { display: flex; align-items: center; gap: 6px; padding: 9px 16px; border: 1.5px solid #d2d2d7; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 500; color: #1d1d1f; transition: all 0.15s; user-select: none; background: #fff; margin-bottom: 0; }
    .radio-group input { display: none; }
    .radio-group label:has(input:checked) { border-color: #6c5ce7; background: #f0eeff; color: #6c5ce7; }

    .impact-group { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
    .impact-group label { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; padding: 12px 8px; border: 1.5px solid #d2d2d7; border-radius: 12px; cursor: pointer; font-size: 13px; font-weight: 500; color: #1d1d1f; transition: all 0.15s; user-select: none; background: #fff; text-align: center; margin-bottom: 0; }
    .impact-group input { display: none; }
    .impact-indicator { font-size: 18px; line-height: 1; }
    .impact-sub { font-size: 11px; font-weight: 400; color: #6e6e73; }
    .impact-high:has(input:checked) { border-color: #ff3b30 !important; background: #fff5f5 !important; color: #ff3b30 !important; }
    .impact-mid:has(input:checked)  { border-color: #ff9f0a !important; background: #fffbf0 !important; color: #c87800 !important; }
    .impact-low:has(input:checked)  { border-color: #30d158 !important; background: #f0fff5 !important; color: #1d8a3c !important; }

    .check-group { display: flex; flex-wrap: wrap; gap: 8px; }
    .check-group label { display: flex; align-items: center; gap: 6px; padding: 8px 16px; border: 1.5px solid #d2d2d7; border-radius: 980px; cursor: pointer; font-size: 13px; font-weight: 500; color: #1d1d1f; transition: all 0.15s; user-select: none; background: #fff; margin-bottom: 0; }
    .check-group input { display: none; }
    .check-group label:has(input:checked) { border-color: #6c5ce7; background: #f0eeff; color: #6c5ce7; }

    .divider { border: none; border-top: 1px solid #f2f2f7; margin: 28px 0; }

    .auto-fields { background: #f5f5f7; border-radius: 12px; padding: 16px 20px; display: flex; gap: 0; }
    .auto-field { flex: 1; padding: 0 8px; }
    .auto-field:not(:last-child) { border-right: 1px solid #e5e5ea; margin-right: 8px; }
    .auto-field .af-label { font-size: 11px; color: #6e6e73; margin-bottom: 4px; font-weight: 500; text-transform: uppercase; }
    .auto-field .af-value { font-size: 13px; font-weight: 600; color: #6c5ce7; }

    .submit-btn { width: 100%; height: 52px; background: #6c5ce7; color: #fff; border: none; border-radius: 980px; font-size: 17px; font-weight: 600; cursor: pointer; margin-top: 28px; transition: background 0.15s; font-family: inherit; }
    .submit-btn:hover { background: #5a4dcc; box-shadow: 0 4px 16px rgba(108,92,231,0.35); }

    .success-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(4px); }
    .success-overlay.show { display: flex; }
    .success-box { background: #fff; border-radius: 20px; padding: 44px 40px 40px; text-align: center; max-width: 360px; width: 90%; box-shadow: 0 32px 80px rgba(0,0,0,0.18); }
    .success-icon { width: 72px; height: 72px; background: #f0eeff; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 32px; }
    .success-box h2 { font-size: 22px; font-weight: 700; color: #1d1d1f; margin-bottom: 8px; }
    .success-box p { font-size: 14px; color: #6e6e73; margin-bottom: 6px; line-height: 1.5; }
    .id-badge { display: inline-block; background: #f0eeff; color: #6c5ce7; border-radius: 8px; padding: 5px 16px; font-size: 13px; font-weight: 700; margin: 14px 0 20px; letter-spacing: 1px; }
    .success-box button { padding: 0 32px; height: 44px; background: #6c5ce7; color: #fff; border: none; border-radius: 980px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; }
    .success-box button:hover { background: #5a4dcc; }

    .invalid-page { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 40px; }
    .invalid-page .inv-icon { font-size: 52px; margin-bottom: 20px; }
    .invalid-page h2 { font-size: 22px; font-weight: 700; color: #1d1d1f; margin-bottom: 10px; }
    .invalid-page p { font-size: 14px; color: #6e6e73; line-height: 1.6; }
  </style>
</head>
<body>

<div class="invalid-page" id="invalidPage">
  <div class="inv-icon">🔒</div>
  <h2>链接无效</h2>
  <p>此链接已失效或不存在，请联系您的对接人获取专属链接。</p>
</div>

<div class="card" id="mainCard" style="display:none">
  <div class="header">
    <div class="badge"><span>🏢</span> SaaS厂商需求采集</div>
    <h1>提交产品需求</h1>
    <p>请详细描述您的功能需求，我们会统一归并处理</p>
    <div class="source-tag">
      <div class="dot"></div>
      <div><strong>厂商：</strong><span id="vendorName">—</span> &nbsp;|&nbsp; <strong>行业：</strong><span id="vendorIndustry">—</span></div>
    </div>
  </div>

  <div class="body">
    <form id="reqForm">
      <div class="field">
        <label>需求描述 <span class="req">*</span><span class="hint">请详细描述业务场景和功能点</span></label>
        <textarea id="desc" placeholder="例：希望在结账时支持扫码核销会员积分，目前只能手动输入，影响收银效率..." required></textarea>
      </div>

      <div class="field">
        <label>来源商户<span class="hint">商户名称或编号（选填）</span></label>
        <input type="text" id="merchant" placeholder="例：北京XX门店 / M-00123" />
      </div>

      <div class="field">
        <label>商户类型 <span class="req">*</span></label>
        <div class="radio-group">
          <label><input type="radio" name="bizType" value="restaurant" required> 🍜 餐厅</label>
          <label><input type="radio" name="bizType" value="retail"> 🛒 零售</label>
          <label><input type="radio" name="bizType" value="bar"> 🍸 酒吧</label>
          <label><input type="radio" name="bizType" value="beauty"> 💅 美业</label>
          <label><input type="radio" name="bizType" value="spa"> 🧖 SPA</label>
          <label><input type="radio" name="bizType" value="hotel"> 🏨 酒店</label>
          <label><input type="radio" name="bizType" value="clinic"> 🏥 诊所</label>
        </div>
      </div>

      <div class="field">
        <label>业务影响 <span class="req">*</span><span class="hint">此需求对业务的影响程度</span></label>
        <div class="impact-group radio-group">
          <label class="impact-high">
            <input type="radio" name="impact" value="high" required>
            <span class="impact-indicator">🔴</span>
            <span style="font-size:12px;font-weight:600">高影响</span>
            <span class="impact-sub">影响核心流程</span>
          </label>
          <label class="impact-mid">
            <input type="radio" name="impact" value="mid">
            <span class="impact-indicator">🟡</span>
            <span style="font-size:12px;font-weight:600">中影响</span>
            <span class="impact-sub">影响部分功能</span>
          </label>
          <label class="impact-low">
            <input type="radio" name="impact" value="low">
            <span class="impact-indicator">🟢</span>
            <span style="font-size:12px;font-weight:600">低影响</span>
            <span class="impact-sub">体验改善</span>
          </label>
        </div>
      </div>

      <div class="field">
        <label>涉及场景 <span class="req">*</span><span class="hint">可多选</span></label>
        <div class="check-group">
          <label><input type="checkbox" name="scene" value="pos"> 🖥️ 收银</label>
          <label><input type="checkbox" name="scene" value="report"> 📊 报表</label>
          <label><input type="checkbox" name="scene" value="member"> 👤 会员</label>
          <label><input type="checkbox" name="scene" value="kitchen"> 📟 厨显</label>
          <label><input type="checkbox" name="scene" value="payment"> 💳 支付</label>
          <label><input type="checkbox" name="scene" value="inventory"> 📦 库存</label>
        </div>
      </div>

      <hr class="divider" />

      <div class="auto-fields">
        <div class="auto-field">
          <div class="af-label">来源厂商</div>
          <div class="af-value" id="autoVendorVal">—</div>
        </div>
        <div class="auto-field">
          <div class="af-label">提交时间</div>
          <div class="af-value" id="nowTime">—</div>
        </div>
        <div class="auto-field">
          <div class="af-label">记录ID预览</div>
          <div class="af-value" id="previewId">—</div>
        </div>
      </div>

      <button type="submit" class="submit-btn">提交需求</button>
    </form>
  </div>
</div>

<div class="success-overlay" id="successOverlay">
  <div class="success-box">
    <div class="success-icon">✅</div>
    <h2>提交成功！</h2>
    <p>您的需求已进入处理队列</p>
    <p style="font-size:12px;color:#aeaeb2;margin-top:4px">AI 将在下一批次自动归并处理</p>
    <div class="id-badge" id="submittedId">—</div>
    <button onclick="resetForm()">继续提交</button>
  </div>
</div>

<script>
const API_BASE = '';
let vendor = null;

async function init() {
  const token = new URLSearchParams(location.search).get('token') || '';
  if (!token || !token.startsWith('SV_')) {
    document.getElementById('invalidPage').style.display = 'flex';
    return;
  }
  const vendors = await fetch(`${API_BASE}/api/saas-vendors`).then(r => r.json()).catch(() => []);
  vendor = vendors.find(v => v.token === token);
  if (!vendor) {
    document.getElementById('invalidPage').style.display = 'flex';
    return;
  }
  document.getElementById('mainCard').style.display = '';
  document.getElementById('vendorName').textContent = vendor.name;
  document.getElementById('vendorIndustry').textContent = vendor.industry;
  document.getElementById('autoVendorVal').textContent = vendor.name;
  document.getElementById('previewId').textContent = `${vendor.code}-****`;
  updateTime();
  setInterval(updateTime, 30000);
}

function updateTime() {
  const now = new Date();
  document.getElementById('nowTime').textContent =
    now.toLocaleDateString('zh-CN') + ' ' + now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
}

document.getElementById('reqForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const scenes = [...document.querySelectorAll('input[name="scene"]:checked')];
  if (scenes.length === 0) { alert('请至少选择一个涉及场景'); return; }
  const text    = document.getElementById('desc').value.trim();
  const merchant = document.getElementById('merchant').value.trim();
  const impact  = document.querySelector('input[name="impact"]:checked')?.value || 'mid';
  const bizType = document.querySelector('input[name="bizType"]:checked')?.value || '';
  const r = await fetch(`${API_BASE}/api/saas-tickets`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ token: vendor.token, text, merchant, impact, scenes: scenes.map(s => s.value), biz_type: bizType })
  });
  if (r.ok) {
    const data = await r.json();
    document.getElementById('submittedId').textContent = data.id || '—';
    document.getElementById('successOverlay').classList.add('show');
  } else {
    alert('提交失败，请联系管理员');
  }
});

function resetForm() {
  document.getElementById('reqForm').reset();
  document.getElementById('successOverlay').classList.remove('show');
  updateTime();
}

init();
</script>
</body>
</html>
